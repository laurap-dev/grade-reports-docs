remote_theme: just-the-docs/just-the-docs

title: Grade Reports Documentation
description: User guide for Grade Reports for Google Classroom

just_the_docs:
  hide_attribution: true

aux_links:
  "Gdev Apps": https://gdev.app/
  "Google Workspace Marketplace": https://workspace.google.com/marketplace/app/grade_reports/167772122975
aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

callouts_level: loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme
